name: Train Model Pipeline

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install dvc
        pip install dvc-s3
        pip install pandas scikit-learn

    - name: Configure AWS Credentials
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_KEY }}
        aws configure set default.region eu-north-1

    - name: Pull Dataset from DVC
      run: |
        dvc pull

    - name: Train Model
      run: |
        python src/train.py | tee metrics.txt

    - name: Publish Metrics
      run: |
        echo "## Training Results (Version 1)" >> $GITHUB_STEP_SUMMARY
        echo "Dataset Size:" >> $GITHUB_STEP_SUMMARY
        grep "Dataset Size" metrics.txt >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "RMSE:" >> $GITHUB_STEP_SUMMARY
        grep "RMSE" metrics.txt >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "R2 Score:" >> $GITHUB_STEP_SUMMARY
        grep "R2" metrics.txt >> $GITHUB_STEP_SUMMARY